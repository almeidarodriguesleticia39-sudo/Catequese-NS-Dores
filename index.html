<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Catequese NS Dores</title>

    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
</head>

<body>

    <main class="login-container">

        <section class="login-card">

            <img
                src="assets/img/logo.jpeg"
                alt="Logo da Paróquia"
                class="logo">

            <h1>Catequese NS Dores</h1>

            <p class="subtitulo">
                Caminhando juntos na fé
            </p>

            <form id="formPesquisa">
                
                <label>Nome do catequizando</label>

                <input
                    type="text"
                    id="pesquisa"
                    placeholder="Digite o nome"
                required>
                
                <button type="submit">

                    Buscar

                </button>

            </form>

<div id="resultado"></div>

        </section>

    </main>

    <footer class="footer">
        <small>
            Versão 2.0 • © Paróquia Nossa Senhora das Dores
        </small>
    </footer>

    <script src="assets/js/dados.js"></script>
    <script src="assets/js/pesquisa.js"></script>

</body>

</html>
